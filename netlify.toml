[build]
  command = "npx vitest run && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

[dev]
command = "npm run dev:vite"
  targetPort = 5173
  port = 3000
  framework = "vite"

[[redirects]]
  from = "/docs/*"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/AGENTS.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/DESIGN.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.pdf"
  to = "/index.html"
  status = 404
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[functions]
  node_bundler = "esbuild" 